name: Build OAN with Docker Compose

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔹 Create .env file
      - name: Create .env file
        run: |
          cat <<EOF > .env
          LLM_PROVIDER=${{ vars.LLM_PROVIDER }}
          LLM_MODEL_NAME=${{ vars.LLM_MODEL_NAME }}
          INFERENCE_ENDPOINT_URL=${{ vars.INFERENCE_ENDPOINT_URL }}
          INFERENCE_API_KEY=${{ secrets.INFERENCE_API_KEY }}
          MAPBOX_API_TOKEN=${{ secrets.MAPBOX_API_TOKEN }}
          MARQO_ENDPOINT_URL=${{ vars.MARQO_ENDPOINT_URL }}
          MARQO_INDEX_NAME=${{ vars.MARQO_INDEX_NAME }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENWEATHERMAP_API_KEY=${{ secrets.OPENWEATHERMAP_API_KEY }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DB_POOL_SIZE=${{ vars.DB_POOL_SIZE }}
          DB_MAX_OVERFLOW=${{ vars.DB_MAX_OVERFLOW }}
          SCRAPER_ENABLED=${{ vars.SCRAPER_ENABLED }}
          azure_foundary_api_key=${{ secrets.azure_foundary_api_key }}
          azure_foundary_region=${{ vars.azure_foundary_region }}
          ENABLE_MODERATION=${{ vars.ENABLE_MODERATION }}
          RAG_PROVIDER=${{ vars.RAG_PROVIDER }}
          COSDATA_ENDPOINT_URL=${{ vars.COSDATA_ENDPOINT_URL }}
          COSDATA_USERNAME=${{ secrets.COSDATA_USERNAME }}
          COSDATA_PASSWORD=${{ secrets.COSDATA_PASSWORD }}
          COSDATA_COLLECTION_NAME=${{ vars.COSDATA_COLLECTION_NAME }}
          EMBEDDING_MODEL_NAME=${{ vars.EMBEDDING_MODEL_NAME }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ vars.AWS_REGION }}
          EOF

      # 🔹 Create network
      - name: Create Docker network
        run: docker network create oannetwork || true

      # 🔹 Clean old containers
      - name: Remove old containers
        run: |
          for container in redis-stack marqo oan_app oan_postgres oan_nominatim; do
            if [ "$(docker ps -aq -f name=$container)" ]; then
              echo "Removing existing container $container"
              docker rm -f $container
            fi
          done
          # CosData container: remove if exists but ignore health later
          docker rm -f oan_cosdata || true

      # 🔹 Build all images
      - name: Build Docker images
        run: docker compose build

      # 🔹 Start required containers
      - name: Start required containers
        run: |
          docker compose up -d redis-stack marqo oan_app oan_postgres oan_nominatim

      # 🔹 Wait for required containers to be healthy
      - name: Wait for required containers
        run: |
          REQUIRED_CONTAINERS=("redis-stack" "marqo" "oan_app" "oan_postgres" "oan_nominatim")
          for container in "${REQUIRED_CONTAINERS[@]}"; do
            for i in {1..30}; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $container || echo "missing")
              echo "$container status: $STATUS"
              if [ "$STATUS" = "healthy" ]; then break; fi
              sleep 5
            done
            # Fail if still unhealthy
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $container || echo "missing")
            if [ "$STATUS" != "healthy" ]; then
              echo "$container is unhealthy, failing build"
              exit 1
            fi
          done

      # 🔹 Start CosData container (health ignored)
      - name: Start CosData
        run: docker compose up -d oan_cosdata

      # 🔹 Start app container (full stack)
      - name: Start full stack app
        run: docker compose up -d oan_app

      - name: Show running containers
        run: docker ps